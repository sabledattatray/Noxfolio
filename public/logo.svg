<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="main_grad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="glass_grad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="white" stop-opacity="0.3"/>
      <stop offset="1" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="premium_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Left Glass Pillar -->
  <rect x="20" y="20" width="14" height="60" rx="7" fill="url(#main_grad)" fill-opacity="0.9" />
  <rect x="22" y="22" width="10" height="56" rx="5" fill="white" fill-opacity="0.1" />

  <!-- The Fluid "N" Bridge -->
  <path d="M20 30C20 24.4772 24.4772 20 30 20H34L66 70C68 73 71.5 75 75 75H80V70L34 20H30C24.4772 20 20 24.4772 20 30Z" fill="url(#main_grad)" filter="url(#premium_glow)" />
  
  <!-- Overlapping Glass Diagonal -->
  <path d="M34 20L75 80H80V70L39 20H34Z" fill="url(#glass_grad)" style="mix-blend-mode: overlay" />

  <!-- Right Glass Pillar -->
  <rect x="66" y="20" width="14" height="60" rx="7" fill="url(#main_grad)" fill-opacity="0.9" />
  <rect x="68" y="22" width="10" height="56" rx="5" fill="white" fill-opacity="0.1" />

  <!-- Highlight Accents -->
  <path d="M22 25C22 23.3431 23.3431 22 25 22H29" stroke="white" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" />
  <path d="M71 78C72.6569 78 74 76.6569 74 75V71" stroke="white" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" />
</svg>
